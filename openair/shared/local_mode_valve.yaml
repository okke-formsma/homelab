# NOTE: esphome.includes is NOT set here. Set it in your valve yaml:
#   esphome:
#     includes: [../shared/local_mode_helpers.h]

http_request:
  timeout: 3s

sensor:
  - platform: template
    name: "Demand"
    id: demand_sensor
    unit_of_measurement: ""
    accuracy_decimals: 2
    icon: "mdi:gauge"
    state_class: measurement
  - platform: template
    name: "Integral Demand"
    id: integral_sensor
    unit_of_measurement: ""
    accuracy_decimals: 2
    icon: "mdi:chart-timeline-variant"
    entity_category: diagnostic
    state_class: measurement

globals:
  - id: smoothed_demand
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: integral_demand
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: current_fan_speed
    type: float
    restore_value: no
    initial_value: "NAN"
  - id: co2_target_val
    type: float
    restore_value: yes
    initial_value: "${co2_target}"
  - id: co2_max_val
    type: float
    restore_value: yes
    initial_value: "${co2_max}"
  - id: humidity_target_val
    type: float
    restore_value: yes
    initial_value: "${humidity_target}"
  - id: humidity_max_val
    type: float
    restore_value: yes
    initial_value: "${humidity_max}"
  - id: ki_scale_val
    type: float
    restore_value: yes
    initial_value: "${ki_scale}"
  - id: integral_max_val
    type: float
    restore_value: yes
    initial_value: "${integral_max}"

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            id(co2_target_num).publish_state(id(co2_target_val));
            id(co2_max_num).publish_state(id(co2_max_val));
            id(humidity_target_num).publish_state(id(humidity_target_val));
            id(humidity_max_num).publish_state(id(humidity_max_val));
            id(ki_scale_num).publish_state(id(ki_scale_val));
            id(integral_max_num).publish_state(id(integral_max_val));

number:
  - platform: template
    name: "CO2 Target"
    id: co2_target_num
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    entity_category: config
    min_value: 0
    max_value: 2000
    step: 50
    optimistic: true
    restore_value: false
    initial_value: ${co2_target}
    set_action:
      - lambda: 'id(co2_target_val) = x;'

  - platform: template
    name: "CO2 Max"
    id: co2_max_num
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    entity_category: config
    min_value: 0
    max_value: 2000
    step: 50
    optimistic: true
    restore_value: false
    initial_value: ${co2_max}
    set_action:
      - lambda: 'id(co2_max_val) = x;'

  - platform: template
    name: "Humidity Target"
    id: humidity_target_num
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    entity_category: config
    min_value: 0
    max_value: 100
    step: 5
    optimistic: true
    restore_value: false
    initial_value: ${humidity_target}
    set_action:
      - lambda: 'id(humidity_target_val) = x;'

  - platform: template
    name: "Humidity Max"
    id: humidity_max_num
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    entity_category: config
    min_value: 0
    max_value: 100
    step: 5
    optimistic: true
    restore_value: false
    initial_value: ${humidity_max}
    set_action:
      - lambda: 'id(humidity_max_val) = x;'

  - platform: template
    name: "Ki Scale"
    id: ki_scale_num
    unit_of_measurement: ""
    icon: "mdi:chart-bell-curve"
    entity_category: config
    min_value: 0
    max_value: 2.0
    step: 0.1
    optimistic: true
    restore_value: false
    initial_value: ${ki_scale}
    set_action:
      - lambda: 'id(ki_scale_val) = x; id(integral_demand) = 0.0f;'

  - platform: template
    name: "Integral Max (polls)"
    id: integral_max_num
    unit_of_measurement: ""
    icon: "mdi:timer-sand"
    entity_category: config
    min_value: 1
    max_value: 60
    step: 1
    optimistic: true
    restore_value: false
    initial_value: ${integral_max}
    set_action:
      - lambda: 'id(integral_max_val) = x; id(integral_demand) = 0.0f;'

interval:
  # ---------- LOCAL MODE VALVE CONTROL ----------
  - interval: ${poll_interval}
    then:
      - if:
          condition:
            and:
              - or:
                  - not:
                      api.connected:
                  - switch.is_on: local_mode
              - lambda: 'return !id(homing_in_progress);'
          then:
            # Read fan speed from openair controller
            - lambda: 'ESP_LOGD("poll", "GET http://${fan_host}/fan/Open%%20AIR%%20Mini");'
            - http_request.get:
                url: "http://${fan_host}/fan/Open%20AIR%20Mini"
                capture_response: true
                on_error:
                  then:
                    - lambda: |-
                        ESP_LOGW("poll", "Fan request failed");
                        id(current_fan_speed) = NAN;
                on_response:
                  then:
                    - lambda: |-
                        ESP_LOGD("poll", "Response: %s", body.c_str());
                        if (response->status_code != 200) {
                          ESP_LOGW("poll", "HTTP error %d", response->status_code);
                          id(current_fan_speed) = NAN;
                          return;
                        }
                        auto p = body.find("\"speed_level\":");
                        if (p == std::string::npos) {
                          ESP_LOGW("poll", "No 'speed_level' field in response");
                          id(current_fan_speed) = NAN;
                          return;
                        }
                        float v = atof(body.c_str() + p + 14);
                        ESP_LOGD("poll", "Fan speed_level: %.0f", v);
                        id(current_fan_speed) = v;
            # Compute demand and set valve position
            - lambda: |-
                const float CO2_TARGET = id(co2_target_val);
                const float CO2_MAX = id(co2_max_val);
                const float HUM_TARGET = id(humidity_target_val);
                const float HUM_MAX = id(humidity_max_val);
                const float SPEED_MIN = ${fan_speed_min};
                const float SPEED_MAX = ${fan_speed_max};
                const float POS_MIN = ${valve_pos_min};
                const float POS_MAX = ${valve_pos_max};
                const float ALPHA = ${smoothing_alpha};
                const float DEAD_BAND = ${dead_band};
                const float KI_SCALE = id(ki_scale_val);
                const float INTEGRAL_MAX = id(integral_max_val);

                float co2 = id(air_Co2).state;
                float hum = id(air_humidity).state;

                // Signed (unclamped) normalized error for each sensor — can be negative
                // when the sensor is below the target, which drains the integral.
                float co2_err = std::isnan(co2) ? 0.0f : (co2 - CO2_TARGET) / (CO2_MAX - CO2_TARGET);
                float hum_err = std::isnan(hum) ? 0.0f : (hum - HUM_TARGET) / (HUM_MAX - HUM_TARGET);
                float signed_error = std::max(co2_err, hum_err);

                // P term: clamp signed error to [0, 1]
                float demand = std::max(0.0f, std::min(1.0f, signed_error));

                // I term: accumulate signed error, clamp to [0, INTEGRAL_MAX] (anti-windup)
                id(integral_demand) = std::max(0.0f, std::min(INTEGRAL_MAX,
                    id(integral_demand) + signed_error));
                float integral_contribution = (id(integral_demand) / INTEGRAL_MAX) * KI_SCALE;
                id(integral_sensor).publish_state(id(integral_demand) / INTEGRAL_MAX);

                // Combined PI demand, clamped to [0, 1]
                float pi_demand = std::max(0.0f, std::min(1.0f, demand + integral_contribution));

                // Apply EMA smoothing
                id(smoothed_demand) = ema(id(smoothed_demand), pi_demand, ALPHA);
                float smoothed = id(smoothed_demand);
                id(demand_sensor).publish_state(smoothed);

                // Compute position using fan speed ratio
                float fan_speed = id(current_fan_speed);
                float position;
                if (std::isnan(fan_speed) || fan_speed <= 0.0f) {
                  // Can't reach fan controller — open fully as safe default
                  position = POS_MAX;
                  ESP_LOGW("local_mode", "Fan unreachable, defaulting to fully open");
                } else {
                  // Normalize fan speed to demand scale (0-1)
                  float fan_demand = std::max(0.0f, std::min(1.0f,
                    (fan_speed - SPEED_MIN) / (SPEED_MAX - SPEED_MIN)));
                  if (fan_demand < DEAD_BAND) {
                    // Dead band: no meaningful demand signal, open all valves fully
                    // to distribute air evenly and prevent hunting near the setpoint
                    position = POS_MAX;
                  } else {
                    // Ratio: close down if fan is running harder than this room needs
                    float ratio = std::max(0.0f, std::min(1.0f, smoothed / fan_demand));
                    position = POS_MIN + ratio * (POS_MAX - POS_MIN);
                  }
                }

                ESP_LOGI("local_mode", "CO2=%.0f hum=%.1f%% demand=%.2f integral=%.2f pi=%.2f smoothed=%.2f fan=%.0f%% -> pos=%.2f",
                         co2, hum, demand, id(integral_demand), pi_demand, smoothed, fan_speed, position);

                auto call = id(air_valve).make_call();
                call.set_position(position);
                call.perform();

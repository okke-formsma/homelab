# Shared package: fan controller local mode logic.
#
# Polls up to 7 valve slots every ${poll_interval} when HA is disconnected
# or "Local Mode" switch is on. Slots with host "0.0.0.0" (or any unreachable
# host) return NAN and are excluded from demand calculation — the system runs
# on whatever valves are reachable.
#
# Required substitutions (set in your device yaml):
#   valve_1_host .. valve_7_host  — hostname or "0.0.0.0" to disable
#
# Unused slots default to "0.0.0.0" in the substitutions block below.
# Tuning parameters come from local_mode_settings.yaml (included below).
#
# NOTE: esphome.includes is NOT set here. Set it in your device yaml:
#   esphome:
#     includes: [../shared/local_mode_helpers.h]

http_request:
  timeout: 3s

globals:
  - id: valve_demand
    type: float[7]
    restore_value: no
    initial_value: "{NAN, NAN, NAN, NAN, NAN, NAN, NAN}"
  - id: smoothed_fan_demand
    type: float
    restore_value: no
    initial_value: "0.0"

sensor:
  - platform: template
    name: "Fan Speed"
    id: fan_speed_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:fan"

interval:
  - interval: ${poll_interval}
    then:
      - if:
          condition:
            or:
              - not:
                  api.connected:
              - switch.is_on: local_mode
          then:
            # Poll enabled valve slots. Disabled slots (0.0.0.0) are skipped
            # entirely to avoid connection errors that crash the device.
            - lambda: |-
                ESP_LOGI("poll", "Starting valve poll cycle");
                ESP_LOGI("poll", "valve_1=${valve_1_host} valve_2=${valve_2_host} valve_3=${valve_3_host} valve_4=${valve_4_host} valve_5=${valve_5_host}");
            - if:
                condition:
                  lambda: 'return std::string("${valve_1_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_1_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_1_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[0] = parse_sensor_value(body, response->status_code);

            - if:
                condition:
                  lambda: 'return std::string("${valve_2_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_2_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_2_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[1] = parse_sensor_value(body, response->status_code);

            - if:
                condition:
                  lambda: 'return std::string("${valve_3_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_3_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_3_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[2] = parse_sensor_value(body, response->status_code);

            - if:
                condition:
                  lambda: 'return std::string("${valve_4_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_4_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_4_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[3] = parse_sensor_value(body, response->status_code);

            - if:
                condition:
                  lambda: 'return std::string("${valve_5_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_5_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_5_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[4] = parse_sensor_value(body, response->status_code);

            - if:
                condition:
                  lambda: 'return std::string("${valve_6_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_6_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_6_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[5] = parse_sensor_value(body, response->status_code);

            - if:
                condition:
                  lambda: 'return std::string("${valve_7_host}") != "0.0.0.0";'
                then:
                  - logger.log: "GET http://${valve_7_host}/sensor/Demand"
                  - http_request.get:
                      url: "http://${valve_7_host}/sensor/Demand"
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGD("poll", "Response: %s", body.c_str());
                              id(valve_demand)[6] = parse_sensor_value(body, response->status_code);

            - lambda: |-
                const float SPEED_MIN = ${fan_speed_min};
                const float SPEED_MAX = ${fan_speed_max};
                const float ALPHA = ${smoothing_alpha};

                float max_demand = 0.0f;
                int active_valves = 0;

                for (int i = 0; i < 7; i++) {
                  float d = id(valve_demand)[i];

                  ESP_LOGD("local_mode", "Valve %d: demand=%.2f",
                           i + 1,
                           std::isnan(d) ? -1.0f : d);

                  if (!std::isnan(d)) {
                    active_valves++;
                    if (d > max_demand) max_demand = d;
                  }
                }

                float fan_demand = (active_valves > 0) ? max_demand : 0.0f;

                id(smoothed_fan_demand) = ema(id(smoothed_fan_demand), fan_demand, ALPHA);
                float smoothed = id(smoothed_fan_demand);

                int speed = (int)(SPEED_MIN + smoothed * (SPEED_MAX - SPEED_MIN));
                ESP_LOGI("local_mode", "Demand: max=%.2f active=%d fan_demand=%.2f smoothed=%.2f -> fan %d%%",
                         max_demand, active_valves, fan_demand, smoothed, speed);

                id(fan_speed_pct).publish_state(speed);

                auto call = id(fan_motor).make_call();
                call.set_speed(speed);
                call.set_state(true);
                call.perform();

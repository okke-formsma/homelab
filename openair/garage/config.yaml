substitutions:
  # Name of this fan controller. Used as ESPHome device name and mDNS hostname.
  # Must match fan_host below (without .local).
  device_name: "open-air-mini-garage"

  # Hostname that the valves in this installation poll for fan speed.
  # Derived from device_name above.
  fan_host: "${device_name}.local"

  # Active valve hostnames for this installation.
  # Unused slots default to "0.0.0.0" (disabled) in local_mode_fan.yaml.
  valve_1_host: "open-air-valve-1.local"
  valve_2_host: "open-air-valve-2.local"
  valve_3_host: "open-air-valve-3.local"
  valve_4_host: "open-air-valve-4.local"
  valve_5_host: "open-air-valve-5.local"

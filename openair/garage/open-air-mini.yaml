packages:
  config: !include config.yaml
  local_mode: !include ../shared/local_mode_fan.yaml

esphome:
  name: ${device_name}
  includes:
    - ../shared/local_mode_helpers.h

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

web_server:
  port: 80

api:

ota:
  - platform: esphome
    password: "9f2ab9aa715f573e2476e75a5ec7f4e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Open-AIR Fallback"
    password: !secret wifi_ap_password

captive_portal:

status_led:
  pin:
    number: GPIO33

output:
  - platform: ledc
    pin: GPIO15
    inverted: true
    id: open_air_mini

fan:
  - platform: speed
    output: open_air_mini
    name: "Open AIR Mini"
    id: fan_motor
    restore_mode: NO_RESTORE

sensor:
  - platform: pulse_counter
    pin: GPIO14
    unit_of_measurement: "RPM"
    name: "AIR Mini RPM"
    id: open_air_mini_rpm

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "MCU Temperature"
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "Firmware Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
      entity_category: diagnostic

switch:
  - platform: template
    name: "Local Mode"
    id: local_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

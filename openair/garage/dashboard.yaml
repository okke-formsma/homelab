- title: Garage (3 days)
  path: garage-3d
  icon: mdi:home-thermometer
  panel: true
  theme: openair
  cards:
  - type: vertical-stack
    cards:
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: template
        icon: mdi:clock-outline
        content: 6 hours
        tap_action:
          action: navigate
          navigation_path: /open-air/garage-6h
      - type: template
        icon: mdi:clock-outline
        content: 1 day
        tap_action:
          action: navigate
          navigation_path: /open-air/garage
      - type: template
        icon: mdi:clock-outline
        content: 3 days
        tap_action:
          action: navigate
          navigation_path: /open-air/garage-3d
        card_mod:
          style: 'ha-card { --chip-background: var(--primary-color) !important; --chip-font-color:
            var(--text-primary-color) !important; --chip-icon-color: var(--text-primary-color)
            !important; }'
      - type: template
        icon: mdi:clock-outline
        content: 1 week
        tap_action:
          action: navigate
          navigation_path: /open-air/garage-7d
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-fan-card
        entity: fan.open_air_mini_garage_open_air_mini
        name: Fan
        icon_animation: true
        tap_action: &id003
          action: navigate
          navigation_path: /config/devices/device/7520238333fb3167b7a52854074ad22e
      - type: custom:mushroom-entity-card
        entity: sensor.open_air_mini_garage_air_mini_rpm
        name: RPM
        icon: mdi:rotate-right
        tap_action: *id003
    - type: grid
      columns: 5
      square: false
      cards:
      - type: custom:stack-in-card
        cards:
        - type: custom:mushroom-template-card
          primary: Entree
          icon: mdi:door
          icon_color: blue
          layout: vertical
          tap_action:
            action: navigate
            navigation_path: /config/devices/device/2b94ce3551ca791a222cab07342b19cd
        - type: grid
          columns: 2
          square: false
          cards:
          - type: custom:mushroom-template-card
            primary: '{{ states(''sensor.valve_entree_co2'')|round(0) }}'
            icon: mdi:molecule-co2
            icon_color: '{% set v = states(''sensor.valve_entree_co2'')|float(0) %}
              {% if v <= 800 %}green{% elif v <= 1200 %}orange{% else %}red{% endif
              %}'
            layout: vertical
            tap_action:
              action: none
          - type: custom:mushroom-template-card

url_path: open-air
title: Open AIR
icon: mdi:hvac
show_in_sidebar: true

# Consistent room colors (mushroom name → hex for mini-graph-card):
#   Entree:     blue    (#448AFF)
#   SLK Achter: red     (#FF1744)
#   BG Voor:    yellow  (#FFD600)
#   Samuel:     orange  (#FF9100)
#   Thomas:     purple  (#D500F9)

views:
  - title: Garage
    path: garage
    icon: mdi:home-thermometer
    panel: true
    cards:
      - type: vertical-stack
        cards:

          # ── Fan ─────────────────────────────────────────────────────────────
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:stack-in-card
                card_mod:
                  style: "ha-card { overflow: hidden; height: 70px; }"
                cards:
                  - type: custom:mini-graph-card
                    entities:
                      - entity: sensor.open_air_mini_garage_fan_speed
                        color: "rgba(var(--rgb-primary-color), 0.15)"
                    hours_to_show: 24
                    line_width: 2
                    height: 55
                    show:
                      name: false
                      icon: false
                      state: false
                      labels: false
                      points: false
                      fill: fade
                    card_mod:
                      style: "ha-card { background: none !important; box-shadow: none !important; border: none !important; margin-top: -8px; }"
                  - type: custom:mushroom-fan-card
                    entity: fan.open_air_mini_garage_open_air_mini
                    name: Fan
                    icon_animation: true
                    card_mod:
                      style: "ha-card { background: none !important; box-shadow: none !important; border: none !important; margin-top: -72px; position: relative; z-index: 1; }"
              - type: custom:stack-in-card
                card_mod:
                  style: "ha-card { overflow: hidden; height: 70px; }"
                cards:
                  - type: custom:mini-graph-card
                    entities:
                      - entity: sensor.open_air_mini_garage_air_mini_rpm
                        color: "rgba(var(--rgb-primary-color), 0.15)"
                    hours_to_show: 24
                    line_width: 2
                    height: 55
                    show:
                      name: false
                      icon: false
                      state: false
                      labels: false
                      points: false
                      fill: fade
                    card_mod:
                      style: "ha-card { background: none !important; box-shadow: none !important; border: none !important; margin-top: -8px; }"
                  - type: custom:mushroom-entity-card
                    entity: sensor.open_air_mini_garage_air_mini_rpm
                    name: RPM
                    icon: mdi:rotate-right
                    card_mod:
                      style: "ha-card { background: none !important; box-shadow: none !important; border: none !important; margin-top: -72px; position: relative; z-index: 1; }"

          # ── Room status (2x2 grid per room) ─────────────────────────────────
          - type: grid
            columns: 5
            square: false
            cards:
              # ── Entree (blue) ──
              - type: custom:stack-in-card
                cards:
                  - type: custom:mushroom-template-card
                    primary: Entree
                    icon: mdi:door
                    icon_color: blue
                    layout: vertical
                    tap_action:
                      action: navigate
                      navigation_path: /config/devices/device/2b94ce3551ca791a222cab07342b19cd
                  - type: grid
                    columns: 2
                    square: false
                    cards:
                      - type: custom:mushroom-template-card
                        primary: "{{ states('sensor.valve_entree_co2')|round(0) }}"
                        icon: mdi:molecule-co2
                        icon_color: >-
                          {% set v = states('sensor.valve_entree_co2')|float(0) %}
                          {% if v <= 800 %}green{% elif v <= 1200 %}orange{% else %}red{% endif %}
                        layout: vertical
                        tap_action: { action: none }
                      - type: custom:mushroom-template-card
                        primary: "{{ states('sensor.valve_entree_humidity')|round(0) }}%"
                        icon: mdi:water-percent
                        icon_color: >-
                          {% set v = states('sensor.valve_entree_humidity')|float(0) %}
                          {% if 40 <= v <= 60 %}green{% else %}red{% endif %}
                        layout: vertical
                        tap_action: { action: none }
                      - type: custom:mushroom-template-card
                        primary: "{{ states('sensor.valve_entree_temperature')|round(1) }}°"
                        icon: mdi:thermometer
                        icon_color: >-
                          {% set v = states('sensor.valve_entree_temperature')|float(0) %}
                          {% if v < 15 %}blue{% elif v < 18 %}amber{% elif v <= 24 %}green{% elif v <= 30 %}orange{% else %}red{% endif %}
                        layout: vertical
                        tap_action: { action: none }
                      - type: custom:mushroom-template-card
                        primary: "{{ states('sensor.valve_entree_valve_position')|round(0) }}%"
                        icon: mdi:valve
                        icon_color: >-
                          {% set v = states('sensor.valve_entree_valve_position')|float(0) %}
                          {% if v == 0 %}red{% else %}grey{% endif %}
                        layout: vertical
                        tap_action: { action: none }

              # ── SLK Achter (red) ──
              - type: custom:stack-in-card
                cards:
                  - type: custom:mushroom-template-card
                    primary: SLK Achter
                    icon: mdi:bed
                    icon_color: red
                    layout: vertical
                    tap_action:

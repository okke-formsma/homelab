          # ── Graphs ─────────────────────────────────────────────────────────
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:apexcharts-card
                header:
                  show: false
                graph_span: 24h
                yaxis:
                  - min: ~400
                    max: ~1500
                    apex_config:
                      forceNiceScale: true
                      tickAmount: 5
                apex_config:
                  title:
                    text: "CO2"
                    floating: true
                    offsetY: 6
                    align: center
                    style:
                      fontSize: "14px"
                      fontWeight: "600"
                  chart:
                    height: 180
                  stroke:
                    width: 2
                  legend:
                    show: false
                  tooltip:
                    enabled: true
                    shared: true
                    intersect: false
                    followCursor: true
                    fixed:
                      enabled: true
                      position: topLeft
                    x:
                      show: false
                series:
                  - entity: sensor.valve_entree_co2
                    name: Entree
                    color: "#448AFF"
                    stroke_width: 2
                    extend_to: now
                    fill_raw: last
                    group_by:
                      func: last
                      duration: 5min
                      fill: last
                  - entity: sensor.valve_slk_achter_co2
                    name: SLK Achter

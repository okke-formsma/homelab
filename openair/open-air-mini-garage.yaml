packages:
  settings: !include local_mode_settings.yaml

substitutions:
  valve_1_host: VALVE_1_HOSTNAME
  valve_2_host: VALVE_2_HOSTNAME
  valve_3_host: VALVE_3_HOSTNAME
  valve_4_host: VALVE_4_HOSTNAME
  valve_5_host: VALVE_5_HOSTNAME

esphome:
  name: open-air-mini-garage
  includes:
    - local_mode_helpers.h

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

web_server:
  port: 80

api:

ota:
  - platform: esphome
    password: "9f2ab9aa715f573e2476e75a5ec7f4e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Open-AIR-Mini Fallback"
    password: "ChangeMe@123!"

captive_portal:

http_request:
  timeout: 3s

globals:
  # Per-valve sensor readings (CO2 and humidity)
  - id: valve_co2
    type: float[5]
    restore_value: no
    initial_value: "{NAN, NAN, NAN, NAN, NAN}"
  - id: valve_humidity
    type: float[5]
    restore_value: no
    initial_value: "{NAN, NAN, NAN, NAN, NAN}"
  # Smoothed fan demand
  - id: smoothed_fan_demand
    type: float
    restore_value: no
    initial_value: "0.0"

status_led:
  pin:
    number: GPIO33

output:
  - platform: ledc
    pin: GPIO15
    inverted: true
    id: open_air_mini

fan:
  - platform: speed
    output: open_air_mini
    name: "Open AIR Mini"
    id: fan_motor
    restore_mode: NO_RESTORE

sensor:
  - platform: pulse_counter
    pin: GPIO14
    unit_of_measurement: "RPM"
    name: "AIR Mini RPM"
    id: open_air_mini_rpm

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "MCU Temperature"
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "Firmware Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
      entity_category: diagnostic

switch:
  - platform: template
    name: "Local Mode"
    id: local_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

interval:
  # Local mode: poll all valve sensors and control fan based on continuous demand.
  - interval: ${poll_interval}
    then:
      - if:
          condition:
            or:
              - not:
                  api.connected:
              - switch.is_on: local_mode
          then:
            # Poll valve 1
            - http_request.get:
                url: "http://${valve_1_host}/sensor/CO2"
                on_response:
                  then:
                    - lambda: 'id(valve_co2)[0] = parse_sensor_value(body, status_code);'
            - http_request.get:
                url: "http://${valve_1_host}/sensor/Humidity"
                on_response:
                  then:
                    - lambda: 'id(valve_humidity)[0] = parse_sensor_value(body, status_code);'

            # Poll valve 2
            - http_request.get:
                url: "http://${valve_2_host}/sensor/CO2"
                on_response:
                  then:
                    - lambda: 'id(valve_co2)[1] = parse_sensor_value(body, status_code);'
            - http_request.get:
                url: "http://${valve_2_host}/sensor/Humidity"
                on_response:
                  then:
                    - lambda: 'id(valve_humidity)[1] = parse_sensor_value(body, status_code);'

            # Poll valve 3
            - http_request.get:
                url: "http://${valve_3_host}/sensor/CO2"
                on_response:
                  then:
                    - lambda: 'id(valve_co2)[2] = parse_sensor_value(body, status_code);'
            - http_request.get:
                url: "http://${valve_3_host}/sensor/Humidity"
                on_response:
                  then:
                    - lambda: 'id(valve_humidity)[2] = parse_sensor_value(body, status_code);'

            # Poll valve 4
            - http_request.get:
                url: "http://${valve_4_host}/sensor/CO2"
                on_response:
                  then:
                    - lambda: 'id(valve_co2)[3] = parse_sensor_value(body, status_code);'
            - http_request.get:
                url: "http://${valve_4_host}/sensor/Humidity"
                on_response:
                  then:
                    - lambda: 'id(valve_humidity)[3] = parse_sensor_value(body, status_code);'

            # Poll valve 5
            - http_request.get:
                url: "http://${valve_5_host}/sensor/CO2"
                on_response:
                  then:
                    - lambda: 'id(valve_co2)[4] = parse_sensor_value(body, status_code);'
            - http_request.get:
                url: "http://${valve_5_host}/sensor/Humidity"
                on_response:
                  then:
                    - lambda: 'id(valve_humidity)[4] = parse_sensor_value(body, status_code);'

            # Compute per-valve demand, aggregate, and set fan speed
            - lambda: |-
                const float CO2_TARGET = ${co2_target};
                const float CO2_MAX = ${co2_max};
                const float HUM_TARGET = ${humidity_target};
                const float HUM_MAX = ${humidity_max};
                const float SPEED_MIN = ${fan_speed_min};
                const float SPEED_MAX = ${fan_speed_max};
                const float ALPHA = ${smoothing_alpha};

                float max_demand = 0.0f;
                float total_demand = 0.0f;
                int active_valves = 0;

                for (int i = 0; i < 5; i++) {
                  float co2_d = compute_demand(id(valve_co2)[i], CO2_TARGET, CO2_MAX);
                  float hum_d = compute_demand(id(valve_humidity)[i], HUM_TARGET, HUM_MAX);
                  float d = std::max(co2_d, hum_d);

                  ESP_LOGD("local_mode", "Valve %d: CO2=%.0f hum=%.1f%% demand=%.2f",
                           i + 1,
                           std::isnan(id(valve_co2)[i]) ? -1.0f : id(valve_co2)[i],
                           std::isnan(id(valve_humidity)[i]) ? -1.0f : id(valve_humidity)[i],
                           d);

                  if (!std::isnan(id(valve_co2)[i]) || !std::isnan(id(valve_humidity)[i])) {
                    active_valves++;
                    total_demand += d;
                    if (d > max_demand) max_demand = d;
                  }
                }

                // Fan factor: at least serve the neediest room, scale up for multiple
                float fan_demand = (active_valves > 0)
                  ? std::max(max_demand, total_demand / (float)active_valves)
                  : 0.0f;

                // Apply EMA smoothing
                id(smoothed_fan_demand) = ema(id(smoothed_fan_demand), fan_demand, ALPHA);
                float smoothed = id(smoothed_fan_demand);

                int speed = (int)(SPEED_MIN + smoothed * (SPEED_MAX - SPEED_MIN));
                ESP_LOGI("local_mode", "Demand: max=%.2f total=%.2f active=%d fan_demand=%.2f smoothed=%.2f -> fan %d%%",
                         max_demand, total_demand, active_valves, fan_demand, smoothed, speed);

                auto call = id(fan_motor).make_call();
                call.set_speed(speed);
                call.set_state(true);
                call.perform();

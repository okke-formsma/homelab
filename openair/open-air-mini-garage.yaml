substitutions:
  valve_1_host: VALVE_1_HOSTNAME
  valve_2_host: VALVE_2_HOSTNAME
  valve_3_host: VALVE_3_HOSTNAME
  valve_4_host: VALVE_4_HOSTNAME
  valve_5_host: VALVE_5_HOSTNAME

esphome:
  name: open-air-mini-garage
  includes:
    - offline_helpers.h

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# This is optional and can be commented out to disable the Web Server
web_server:
  port: 80

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    password: "9f2ab9aa715f573e2476e75a5ec7f4e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Open-AIR-Mini Fallback"
    password: "ChangeMe@123!"

captive_portal:

http_request:
  timeout: 3s

globals:
  # Offline valve polling: worst sensor values seen across all valves
  - id: offline_worst_co2
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: offline_worst_humidity
    type: float
    restore_value: no
    initial_value: "0.0"

# Status led
status_led:
  pin:
    number: GPIO33

#PWM output for controlling the motor.
output:
  - platform: ledc
    pin: GPIO15
    inverted: true
    id: open_air_mini

fan:
  - platform: speed
    output: open_air_mini
    name: "Open AIR Mini"
    id: fan_motor
    restore_mode: NO_RESTORE

sensor:
  - platform: pulse_counter
    pin: GPIO14
    unit_of_measurement: "RPM"
    name: "AIR Mini RPM"
    id: open_air_mini_rpm

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "MCU Temperature"
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "Firmware Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
      entity_category: diagnostic

switch:
  - platform: template
    name: "Local Mode"
    id: local_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

interval:
  # Offline mode: poll all valve sensors and control fan based on worst reading.
  # Update valve_x_host substitutions at the top of the file.
  - interval: 60s
    then:
      - if:
          condition:
            or:
              - not:
                  api.connected:
              - switch.is_on: local_mode
          then:
            - lambda: |-
                id(offline_worst_co2) = 0.0f;
                id(offline_worst_humidity) = 0.0f;

            # Valve 1
            - http_request.get:
                url: "http://${valve_1_host}/sensor/air_co2"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_co2), body, status_code);'
            - http_request.get:
                url: "http://${valve_1_host}/sensor/air_humidity"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_humidity), body, status_code);'

            # Valve 2
            - http_request.get:
                url: "http://${valve_2_host}/sensor/air_co2"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_co2), body, status_code);'
            - http_request.get:
                url: "http://${valve_2_host}/sensor/air_humidity"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_humidity), body, status_code);'

            # Valve 3
            - http_request.get:
                url: "http://${valve_3_host}/sensor/air_co2"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_co2), body, status_code);'
            - http_request.get:
                url: "http://${valve_3_host}/sensor/air_humidity"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_humidity), body, status_code);'

            # Valve 4
            - http_request.get:
                url: "http://${valve_4_host}/sensor/air_co2"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_co2), body, status_code);'
            - http_request.get:
                url: "http://${valve_4_host}/sensor/air_humidity"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_humidity), body, status_code);'

            # Valve 5
            - http_request.get:
                url: "http://${valve_5_host}/sensor/air_co2"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_co2), body, status_code);'
            - http_request.get:
                url: "http://${valve_5_host}/sensor/air_humidity"
                on_response:
                  then:
                    - lambda: 'update_worst_value(id(offline_worst_humidity), body, status_code);'

            # Set fan speed based on worst values
            - lambda: |-
                float co2 = id(offline_worst_co2);
                float hum = id(offline_worst_humidity);
                int speed;
                if (co2 > 1500.0f || hum > 75.0f) speed = 70;
                else if (co2 > 900.0f || hum > 65.0f) speed = 40;
                else speed = 15;
                auto call = id(fan_motor).make_call();
                call.set_speed(speed);
                call.set_state(true);
                call.perform();


packages:
  defaults: !include ../shared/local_mode_defaults.yaml
  settings: !include ../shared/local_mode_settings.yaml

substitutions:
  # Name of this fan controller. Used as ESPHome device name and mDNS hostname.
  # Must match fan_host below (without .local).
  device_name: "open-air-mini-huis"

  # Hostname that the valves in this installation poll for fan speed.
  # Derived from device_name above.
  fan_host: "${device_name}.local"

  # Active valve hostnames for this installation (4 valves).
  # Overrides defaults from local_mode_defaults.yaml.
  valve_1_host: "open-air-valve-huis-1.local"
  valve_2_host: "open-air-valve-huis-2.local"
  valve_3_host: "open-air-valve-huis-3.local"
  valve_4_host: "open-air-valve-huis-4.local"

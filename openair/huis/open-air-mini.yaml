packages:
  local_mode: !include ../shared/local_mode_fan.yaml

esphome:
  name: ${device_name}
  includes:
    - ../shared/local_mode_helpers.h

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

web_server:
  port: 80

api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Open-AIR Fallback"
    password: !secret wifi_ap_password

captive_portal:

i2c:
  - id: i2c_sensor_1
    sda: GPIO16
    scl: GPIO4
    scan: false
    frequency: 400kHz

status_led:
  pin:
    number: GPIO33

output:
  - platform: ledc
    pin: GPIO15
    inverted: true
    id: open_air_mini

fan:
  - platform: speed
    output: open_air_mini
    name: "Open AIR Mini"
    id: fan_motor
    restore_mode: NO_RESTORE

sensor:
  - platform: pulse_counter
    pin: GPIO14
    unit_of_measurement: "RPM"
    name: "AIR Mini RPM"
    id: open_air_mini_rpm
    update_interval: 15s

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "MCU Temperature"
    entity_category: diagnostic

  - platform: sht4x
    i2c_id: i2c_sensor_1
    temperature:
      name: "Temperature"
      id: air_temperature
      accuracy_decimals: 2
    humidity:
      name: "Humidity"
      id: air_humidity
      accuracy_decimals: 2
    update_interval: 15s

text_sensor:
  - platform: version
    name: "Firmware Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
      entity_category: diagnostic

switch:
  - platform: template
    name: "Local Mode"
    id: local_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

interval:
  # Kickstart: if fan has power but isn't spinning, briefly boost to overcome
  # static friction. Prevents burndown from stalled motor with power applied.
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - fan.is_on: fan_motor
              - lambda: 'return id(open_air_mini_rpm).state < 10;'
          then:
            - logger.log: "Fan kickstart: fan is on but RPM near 0, boosting to 20%"
            - fan.turn_on:
                id: fan_motor
                speed: 20
            - delay: 5s

esphome:
  name: open-air-mini-huis

esp32:
  board: esp32dev

# Enable logging
logger:
  level: DEBUG

# This is optional and can be commented out to disable the Web Server
web_server:
  port: 80

# Enable Home Assistant API
api:

ota:
  platform: esphome
  password: "9f2ab9aa715f573e2476e75a5ec7f4e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Open-AIR-Mini Fallback"
    password: "ChangeMe@123!"

captive_portal:

globals:
  # Hold “medium” speed for a while after humidity drops below the medium threshold.
  - id: medium_hold_seconds
    type: int
    restore_value: no
    initial_value: "1200" # 20 minutes

  # Internal: timestamp (millis) until which we keep medium speed.
  - id: medium_hold_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # Disconnected Mode Default Fan Speed, for humidities lower than Disconnected Hum Level Medium Speed
  # or if NOT using a humidity sensor. Without sensor this speed will be maintained untill a connection
  # to Home Assistant has been restored and your automations can take over.
  - id: disconnected_default_fan_speed
    type: int
    restore_value: no
    initial_value: "10"
  # Disconnected Mode Medium Fan Speed, linked to Disconnected Hum Level Medium Speed
  - id: disconnected_medium_fan_speed
    type: int
    restore_value: no
    initial_value: "25"
  # Disconnected Mode Max Fan Speed, linked to Disconnected Hum Level Max Speed
  - id: disconnected_max_fan_speed
    type: int
    restore_value: no
    initial_value: "50"
  # Disconnected Mode Medium Fan Speed Threshold
  - id: disconnected_hum_level_medium_speed
    type: int
    restore_value: no
    initial_value: "65"
  # Disconnected Mode Max Fan Speed Threshold
  - id: disconnected_hum_level_max_speed
    type: int
    restore_value: no
    initial_value: "80"

# From V1.4.0 The Sensor pins on the Open AIR Mini are swapped. Correct example is below:
uart:
  #UART For Sensor 2
  - rx_pin: GPIO13
    tx_pin: GPIO12
    baud_rate: 9600
    id: uart_sensor_2
  #UART For Sensor 1
  - rx_pin: GPIO25
    tx_pin: GPIO26
    baud_rate: 9600
    id: uart_sensor_1

i2c:
  #I2C For Sensor 2
  - id: i2c_sensor_2
    sda: GPIO19
    scl: GPIO18
    scan: false
    frequency: 400kHz
  #I2C For Sensor 1
  - id: i2c_sensor_1
    sda: GPIO16
    scl: GPIO4
    scan: false
    frequency: 400kHz

# Status led
status_led:
  pin:
    number: GPIO33

#PWM output for controlling the motor.
output:
  - platform: ledc
    pin: GPIO15
    inverted: true
    id: open_air_mini

fan:
  - platform: speed
    output: open_air_mini
    name: "Open AIR Mini"
    id: fan_motor
    restore_mode: NO_RESTORE

sensor:
  - platform: pulse_counter
    pin: GPIO14
    unit_of_measurement: "RPM"
    name: "AIR Mini RPM"
    id: open_air_mini_rpm

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  # humidity sensor
  - platform: sht4x
    i2c_id: i2c_sensor_1
    temperature:
      name: "Open AIR Mini x Temperature"
      id: air_temperature
      accuracy_decimals: 2
    humidity:
      name: "Open AIR Mini x Humidity"
      id: air_humidity
      accuracy_decimals: 2
    update_interval: 30s

switch:
  - platform: template
    name: "Local Mode"
    id: local_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

script: !include humidity-control-mode.yaml

interval:
  - interval: 30s
    then:
      - logger.log: "Humidity Control Check"
      - if:
          condition:
            or:
              - not:
                  api.connected:
              - switch.is_on: local_mode
          then:
            - logger.log: "Running humidity control (disconnected or local mode)"
            - script.execute: humidity_control
          else:
            - logger.log: "HA control (connected + local mode off)"
            - script.stop: humidity_control

  # Kickstart: if fan has power but isn't spinning, briefly boost to overcome
  # static friction. Prevents burndown from stalled motor with power applied.
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - fan.is_on: fan_motor
              - lambda: 'return id(open_air_mini_rpm).state < 10;'
          then:
            - logger.log: "Fan kickstart: fan is on but RPM near 0, boosting to 20%"
            - fan.turn_on:
                id: fan_motor
                speed: 20
            - delay: 5s
